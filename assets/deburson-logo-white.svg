<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Deburson Product Consulting</title>

  <!-- Stacked bar D mark -->
  <g transform="translate(50, 75)">
    <rect x="0" y="0"  width="20" height="7" rx="3.5" fill="#f1f5f9"/>
    <rect x="0" y="11" width="32" height="7" rx="3.5" fill="#f1f5f9"/>
    <rect x="0" y="22" width="44" height="7" rx="3.5" fill="#06d6a0"/>
    <rect x="0" y="33" width="32" height="7" rx="3.5" fill="#f1f5f9"/>
    <rect x="0" y="44" width="20" height="7" rx="3.5" fill="#f1f5f9"/>
  </g>

  <!-- Wordmark -->
  <text x="116" y="112" font-size="50" font-weight="300" letter-spacing="-0.5"
